# Example email-report options for github-usage.
# Copy to .github-usage/config.toml or run: scripts/setup
#
# This file contains no secrets. Generated local config lives in .github-usage/ (gitignored).

[email_report]
include_consumers = false
include_artifact_storage = false
include_release_assets = false
max_repos = 100
# Email body format: "text" (default) or "html". HTML requires the renderer
# in github_usage.email_report.format_html_report; text uses format_report_email.
email_format = "text"
warn_over = [
  "25",
  "80%",
]
skip_actions = false
skip_copilot = false
skip_lfs = false

[schedule]
weekday = 1
hour = 9
minute = 0

[github_actions]
cron = "0 9 * * 1"
include_consumers = false
include_artifact_storage = false
include_release_assets = false
