repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: forbid-generated-reports
        name: Forbid generated reports
        entry: Generated github-usage report files should not be committed.
        language: fail
        files: ^github-usage-.*\.json$
      - id: check-backups
        name: Check backup file policy
        entry: scripts/check-backups
        language: system
        always_run: true
        pass_filenames: false
      - id: prune-stale-backups
        name: Prune stale backups (backups/*.bak older than 5 commits)
        entry: scripts/prune-backups
        language: system
        always_run: true
        pass_filenames: false
