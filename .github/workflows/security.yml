name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  local-security:
    name: Local security checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python security tools
        run: python -m pip install -e '.[dev]'
      - name: Install Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run repository security script
        run: GITHUB_USAGE_SKIP_GITLEAKS=1 scripts/security
